type Product @model @auth(rules: [{ allow: public }]) {
  id: ID!
  name: String!
  category: String!
  price: Float!
  seller: User @connection(fields: ["sellerId"])
  sellerId: ID!
}

type User @model {
  id: ID!
  name: String!
  email: String!
  products: [Product] @connection(keyName: "bySeller", fields: ["id"])
}
