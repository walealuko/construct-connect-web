# This workflow will do a clean installation of node dependencies, cache/restore them, lint, build, and run tests across the supported Node.js LTS lines.
# For more information see: https://docs.github.com/en/actions/automating-builds-and-tests/building-and-testing-nodejs

name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:

    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x, 22.x]
        # See supported Node.js release schedule at https://nodejs.org/en/about/releases/
        # Next.js 16 requires Node ≥ 18.18; 20 is current LTS, 22 is active LTS.

    # Placeholder env values match the dev defaults in lib/supabase.ts
    # so a clean clone can run `npm install && npm run lint && npm test
    # && npm run build` end-to-end without real secrets. Real secrets
    # come from GitHub Actions secrets in production deploys.
    env:
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-key-12345
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      PAYSTACK_SECRET_KEY: sk_test_placeholder
      NEXT_PUBLIC_BASE_URL: http://localhost:3000

    steps:
    - uses: actions/checkout@v4
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v4
      with:
        node-version: ${{ matrix.node-version }}
        cache: 'npm'
    - run: npm ci
    - run: npm run lint
    - run: npm test
    - run: npm run build --if-present
