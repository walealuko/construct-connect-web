<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Construct Centre">
  <!--
    Stacked-block mark for Construct Centre.
    A simple building silhouette: a base block (slate), a top floor
    slightly inset, and a roof "cap" in the brand blue. Designed to
    stay readable at 16x16 — no text, no thin strokes.
  -->
  <rect x="8"  y="32" width="48" height="24" fill="#0f172a" />
  <rect x="16" y="18" width="32" height="14" fill="#0f172a" />
  <!--
    Roof: a wide triangle that reads as a pitched top. Using a path
    rather than a polygon so the apex is crisp at small sizes.
  -->
  <path d="M4 18 L60 18 L32 0 Z" fill="#2563eb" />
</svg>
