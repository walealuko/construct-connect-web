<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 64" role="img" aria-label="Construct Centre">
  <!--
    Horizontal lockup: stacked-block mark on the left, two-tone
    wordmark on the right. Color split (slate / blue) mirrors the
    Sidebar wordmark in the app so brand reads consistently across
    the navbar and the dashboard chrome.

    viewBox is sized for the navbar's natural rendering width
    (h-12 ≈ 48px). Mark sits in the leftmost 64 units; the
    wordmark fills the rest with sensible kerning.
  -->
  <!-- Mark -->
  <g>
    <rect x="8"  y="32" width="48" height="24" fill="#0f172a" />
    <rect x="16" y="18" width="32" height="14" fill="#0f172a" />
    <path d="M4 18 L60 18 L32 0 Z" fill="#2563eb" />
  </g>
  <!-- Wordmark: two-tone "Construct" + "Centre" -->
  <text x="80" y="44"
        font-family="system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif"
        font-size="34"
        font-weight="800"
        letter-spacing="-0.5"
        fill="#0f172a">Construct <tspan fill="#2563eb">Centre</tspan></text>
</svg>
